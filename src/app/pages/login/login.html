<div class="login-card">
  <h1 class="login-title">EMS Portal</h1>
  <p class="login-subtitle">Đăng nhập để tiếp tục</p>

  @if (errorMessage()) {
    <p-message severity="error" [text]="errorMessage()" styleClass="mb-3 w-full" />
  }

  <div class="field">
    <label for="username">Tên đăng nhập</label>
    <input
      pInputText
      id="username"
      [(ngModel)]="username"
      placeholder="Nhập username"
      [disabled]="loading()"
      (keydown.enter)="onLogin()"
      autocomplete="username"
    />
  </div>

  <div class="field">
    <label for="password">Mật khẩu</label>
    <p-password
      id="password"
      [(ngModel)]="password"
      placeholder="Nhập mật khẩu"
      [disabled]="loading()"
      [feedback]="false"
      [toggleMask]="true"
      (keydown.enter)="onLogin()"
      autocomplete="current-password"
    />
  </div>

  <p-button
    label="Đăng nhập"
    (onClick)="onLogin()"
    [loading]="loading()"
    [disabled]="!username || !password"
    styleClass="login-btn"
  />
</div>
